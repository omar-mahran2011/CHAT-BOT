<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فلفل 🌶️</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0ede8;
      --surface:   #faf8f5;
      --surface2:  #f0ede8;
      --border:    #e0dbd2;
      --border2:   #cdc7bc;

      --sage:      #7a9e87;
      --sage-light:#e8f0eb;
      --sage-mid:  #b8d4c0;
      --terracotta:#c4856a;
      --terra-light:#f5e8e2;

      --me-bg:     #ddeee2;
      --me-border: #b8d4c0;
      --me-text:   #2d4f38;

      --him-bg:    #ffffff;
      --him-border:#e8e2d8;
      --him-text:  #3a3530;

      --text:      #3a3530;
      --text-dim:  #8a8078;
      --text-muted:#b5afa6;

      --online:    #7a9e87;
      --font:      'IBM Plex Sans Arabic', sans-serif;

      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    }

    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    body {
      height: 100%;
      min-height: -webkit-fill-available;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Soft ambient blobs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 40% at 10% 5%, rgba(122,158,135,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 45% 35% at 90% 95%, rgba(196,133,106,0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: rgba(250, 248, 245, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }

    .avatar-wrap { position: relative; flex-shrink: 0; }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sage), #5a8068);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 0 3px var(--sage-light), 0 2px 8px rgba(122,158,135,0.3);
    }

    .online-dot {
      position: absolute;
      bottom: 1px;
      left: 1px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--online);
      border: 2px solid var(--surface);
      animation: pulse-dot 3s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(122,158,135,0.5); }
      50%       { box-shadow: 0 0 0 5px rgba(122,158,135,0); }
    }

    .header-info { flex: 1; min-width: 0; }

    .header-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .header-status {
      font-size: 11.5px;
      color: var(--sage);
      margin-top: 1px;
      font-weight: 400;
    }

    .header-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all 0.18s;
      box-shadow: var(--shadow-sm);
    }
    .header-btn:hover {
      background: var(--sage-light);
      border-color: var(--sage-mid);
      color: var(--sage);
      transform: scale(1.05);
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 32px 20px 20px;
      animation: fade-up 0.5s ease;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .welcome-icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sage-light), #d0e8d8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 14px;
      box-shadow: 0 4px 20px rgba(122,158,135,0.2);
    }

    .welcome h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .welcome p {
      font-size: 13.5px;
      color: var(--text-dim);
      line-height: 1.65;
    }

    /* Date separator */
    .date-sep {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin: 10px 0 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .date-sep::before, .date-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Message row */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: pop-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pop-in {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-row.me  { flex-direction: row-reverse; }
    .msg-row.him { flex-direction: row; }

    .mini-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sage), #5a8068);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-bottom: 2px;
      box-shadow: var(--shadow-sm);
    }

    .bubble-wrap { display: flex; flex-direction: column; max-width: 74%; }
    .me  .bubble-wrap { align-items: flex-end; }
    .him .bubble-wrap { align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.6;
      font-weight: 400;
      word-break: break-word;
      box-shadow: var(--shadow-sm);
    }

    .me .bubble {
      background: var(--me-bg);
      border: 1px solid var(--me-border);
      border-bottom-right-radius: 5px;
      color: var(--me-text);
    }

    .him .bubble {
      background: var(--him-bg);
      border: 1px solid var(--him-border);
      border-bottom-left-radius: 5px;
      color: var(--him-text);
    }

    .bubble-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 4px;
      direction: ltr;
    }

    /* Typing indicator */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: pop-in 0.25s ease;
    }

    .typing-bubble {
      background: var(--him-bg);
      border: 1px solid var(--him-border);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
      box-shadow: var(--shadow-sm);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--sage);
      animation: bounce 1.3s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-7px); opacity: 1; }
    }

    /* Error */
    .error-toast {
      background: #fde8e8;
      border: 1px solid #f0c0c0;
      color: #b05050;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      text-align: center;
      margin: 4px 0;
      animation: pop-in 0.2s ease;
    }

    /* ── Footer ── */
    footer {
      padding: 10px 14px 14px;
      background: rgba(250, 248, 245, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* Quick chips */
    .quick-prompts {
      display: flex;
      gap: 7px;
      padding-bottom: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .quick-prompts::-webkit-scrollbar { display: none; }

    .chip {
      white-space: nowrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 12.5px;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.18s;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }
    .chip:hover {
      background: var(--sage-light);
      border-color: var(--sage-mid);
      color: var(--sage);
      transform: translateY(-1px);
    }

    /* Input row */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 9px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 8px 8px 8px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow-sm);
    }
    .input-row:focus-within {
      border-color: var(--sage-mid);
      box-shadow: 0 0 0 3px rgba(122,158,135,0.12);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14.5px;
      resize: none;
      max-height: 110px;
      line-height: 1.5;
      padding: 3px 0;
    }
    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sage), #5a8068);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(122,158,135,0.35);
    }
    #send-btn:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 4px 14px rgba(122,158,135,0.5);
    }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    #send-btn svg { fill: white; }

    @media (max-width: 480px) {
      .bubble { font-size: 14px; }
      .bubble-wrap { max-width: 82%; }
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="avatar-wrap">
      <div class="avatar">🌶️</div>
      <div class="online-dot"></div>
    </div>
    <div class="header-info">
      <div class="header-name">فلفل</div>
      <div class="header-status">متصل — وفضولي 👀</div>
    </div>
    <button class="header-btn" onclick="clearChat()" title="مسح">🗑️</button>
  </header>

  <div id="messages">
    <div class="welcome">
      <div class="welcome-icon">🌶️</div>
      <h2>أهلاً! أنا فلفل 😄</h2>
      <p>صاحبك الفضولي اللي مش هيسيبك<br/>من غير ما يعرف كل تفاصيلك 👀</p>
    </div>
  </div>

  <footer>
    <div class="quick-prompts">
      <button class="chip" onclick="quick('إيه أخبارك؟')">إيه أخبارك؟ 👋</button>
      <button class="chip" onclick="quick('عندي مشكلة')">عندي مشكلة 😔</button>
      <button class="chip" onclick="quick('حصل معايا حاجة النهارده')">حصل حاجة 👀</button>
      <button class="chip" onclick="quick('أنا زهقان')">زهقان 😒</button>
      <button class="chip" onclick="quick('عندي خبر')">عندي خبر 🗣️</button>
      <button class="chip" onclick="quick('قلي نكتة')">نكتة 😂</button>
    </div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="قول لفلفل..."></textarea>
      <button id="send-btn" onclick="send()">
        <svg width="15" height="15" viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </footer>

</div>
<script>
  const msgs  = document.getElementById('messages');
  const inp   = document.getElementById('input');
  const btn   = document.getElementById('send-btn');
  let history = [];
  let busy    = false;

  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function time() {
    return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  }

  function removeWelcome() {
    const w = msgs.querySelector('.welcome');
    if (w) w.remove();
  }

  function addMsg(role, text) {
    removeWelcome();
    const row = document.createElement('div');
    row.className = `msg-row ${role === 'user' ? 'me' : 'him'}`;

    if (role === 'assistant') {
      const av = document.createElement('div');
      av.className = 'mini-avatar';
      av.textContent = '🌶️';
      row.appendChild(av);
    }

    const wrap  = document.createElement('div');
    wrap.className = 'bubble-wrap';

    const bub   = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = text;

    const t = document.createElement('div');
    t.className = 'bubble-time';
    t.textContent = time();

    wrap.appendChild(bub);
    wrap.appendChild(t);
    row.appendChild(wrap);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing';
    const av = document.createElement('div');
    av.className = 'mini-avatar';
    av.textContent = '🌶️';
    const bub = document.createElement('div');
    bub.className = 'typing-bubble';
    bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    row.appendChild(av);
    row.appendChild(bub);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function showErr(msg) {
    const el = document.createElement('div');
    el.className = 'error-toast';
    el.textContent = msg;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => el.remove(), 5000);
  }

  async function send(text) {
    const msg = (text || inp.value).trim();
    if (!msg || busy) return;

    inp.value = '';
    inp.style.height = 'auto';
    busy = true;
    btn.disabled = true;

    history.push({ role: 'user', content: msg });
    addMsg('user', msg);
    showTyping();

    try {
      const res  = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      hideTyping();

      if (!res.ok || data.error) {
        showErr('❌ ' + (data.error || `خطأ ${res.status}`));
        history.pop();
        return;
      }

      history.push({ role: 'assistant', content: data.reply });
      addMsg('assistant', data.reply);
    } catch (err) {
      hideTyping();
      showErr('في مشكلة في الاتصال: ' + err.message);
      history.pop();
    } finally {
      busy = false;
      btn.disabled = false;
      inp.focus();
    }
  }

  function quick(text) { send(text); }

  function clearChat() {
    history = [];
    msgs.innerHTML = `
      <div class="welcome">
        <div class="welcome-icon">🌶️</div>
        <h2>أهلاً! أنا فلفل 😄</h2>
        <p>صاحبك الفضولي اللي مش هيسيبك<br/>من غير ما يعرف كل تفاصيلك 👀</p>
      </div>`;
  }
</script>
</body>
</html>
